<!DOCTYPE html>
<html lang="es" data-theme="amoled">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Himnario Digital de la Iglesia del Señor – Región Lanín. Accede a los 385 himnos con búsqueda inteligente, favoritos y modo lectura offline." />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Himnario IDS" />

  <!-- Open Graph -->
  <meta property="og:title" content="Himnario Digital IDS Lanín" />
  <meta property="og:description" content="385 himnos de la Iglesia del Señor – Región Lanín" />
  <meta property="og:type" content="website" />

  <title>Himnario Digital IDS Lanín</title>

  <!-- Manifest PWA -->
  <link rel="manifest" href="manifest.json" />

  <!-- Íconos Apple -->
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="icons/icon-16.png" />

  <!-- Fuente del sistema (sin dependencia externa) -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
  </style>

  <!-- Hojas de estilo modulares -->
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/navbar.css" />
  <link rel="stylesheet" href="css/cards.css" />
  <link rel="stylesheet" href="css/modal.css" />
  <link rel="stylesheet" href="css/animations.css" />
</head>
<body>

  <!-- =============================================
       BARRA DE NAVEGACIÓN SUPERIOR
       ============================================= -->
  <header class="navbar" role="banner">
    <div class="navbar__brand">
      <div class="navbar__logo" aria-hidden="true">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="20" cy="20" r="20" fill="#9d4edf" opacity="0.15"/>
          <path d="M20 8 L20 32 M12 16 L28 16" stroke="#9d4edf" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="20" cy="20" r="3" fill="#9d4edf"/>
        </svg>
      </div>
      <div class="navbar__title-group">
        <h1 class="navbar__title">Himnario IDS</h1>
        <span class="navbar__subtitle">Lanín</span>
      </div>
    </div>

    <nav class="navbar__actions" aria-label="Acciones principales">
      <button
        class="btn-icon"
        id="btn-toggle-view"
        aria-label="Cambiar vista"
        title="Cambiar vista"
      >
        <svg class="icon icon-grid" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
        </svg>
        <svg class="icon icon-list hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>

      <button
        class="btn-icon"
        id="btn-toggle-favorites-view"
        aria-label="Ver favoritos"
        title="Mis favoritos"
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
        <span class="badge" id="favorites-count" aria-label="Cantidad de favoritos">0</span>
      </button>
    </nav>
  </header>

  <!-- =============================================
       BARRA DE BÚSQUEDA Y FILTROS
       ============================================= -->
  <section class="search-section" aria-label="Búsqueda y filtros">
    <div class="search-container">
      <label for="search-input" class="sr-only">Buscar himno</label>
      <div class="search-wrapper">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input
          type="search"
          id="search-input"
          class="search-input"
          placeholder="Buscar por título, número o letra…"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
          aria-label="Buscar himno por título, número o letra"
        />
        <button class="search-clear hidden" id="search-clear" aria-label="Limpiar búsqueda">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Filtros por categoría -->
    <div class="filter-bar" id="filter-bar" role="group" aria-label="Filtrar por categoría">
      <button class="filter-chip active" data-category="all">Todos</button>
      <!-- Las categorías se generan dinámicamente desde JS -->
    </div>

    <!-- Indicador de resultados -->
    <div class="results-info" id="results-info" aria-live="polite" aria-atomic="true">
      <span id="results-count">Cargando…</span>
    </div>
  </section>

  <!-- =============================================
       CONTENIDO PRINCIPAL – GRILLA DE HIMNOS
       ============================================= -->
  <main class="main-content" id="main-content" role="main">
    <!-- Estado de carga -->
    <div class="loading-state" id="loading-state" aria-label="Cargando himnos">
      <div class="spinner" aria-hidden="true"></div>
      <p>Cargando himnario…</p>
    </div>

    <!-- Estado vacío (sin resultados) -->
    <div class="empty-state hidden" id="empty-state" role="status">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        <line x1="8" y1="11" x2="14" y2="11"/>
      </svg>
      <h2>Sin resultados</h2>
      <p id="empty-message">No se encontraron himnos con esa búsqueda.</p>
      <button class="btn-secondary" id="btn-clear-search">Limpiar búsqueda</button>
    </div>

    <!-- Grilla de tarjetas -->
    <div
      class="hymns-grid"
      id="hymns-grid"
      role="list"
      aria-label="Lista de himnos"
    ></div>

    <!-- Paginación / carga infinita -->
    <div class="pagination-sentinel" id="pagination-sentinel" aria-hidden="true"></div>
  </main>

  <!-- =============================================
       MODAL DE LECTURA DE HIMNO
       ============================================= -->
  <div
    class="modal-overlay"
    id="modal-overlay"
    role="dialog"
    aria-modal="true"
    aria-labelledby="modal-hymn-title"
    aria-hidden="true"
  >
    <div class="modal" id="modal">
      <!-- Cabecera del modal -->
      <header class="modal__header">
        <div class="modal__meta">
          <span class="modal__number" id="modal-hymn-number">#001</span>
          <span class="modal__category" id="modal-hymn-category">Categoría</span>
        </div>
        <h2 class="modal__title" id="modal-hymn-title">Título del Himno</h2>

        <div class="modal__actions">
          <!-- Control de tamaño de fuente -->
          <div class="font-size-control" role="group" aria-label="Tamaño de fuente">
            <button class="btn-icon btn-icon--sm" id="btn-font-decrease" aria-label="Reducir tamaño de fuente" title="Reducir fuente">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="9" cy="9" r="6"/><line x1="15" y1="15" x2="21" y2="21"/>
                <line x1="6" y1="9" x2="12" y2="9"/>
              </svg>
            </button>
            <span class="font-size-label" id="font-size-label" aria-live="polite">16px</span>
            <button class="btn-icon btn-icon--sm" id="btn-font-increase" aria-label="Aumentar tamaño de fuente" title="Aumentar fuente">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="9" cy="9" r="6"/><line x1="15" y1="15" x2="21" y2="21"/>
                <line x1="9" y1="6" x2="9" y2="12"/><line x1="6" y1="9" x2="12" y2="9"/>
              </svg>
            </button>
          </div>

          <!-- Botón favorito en modal -->
          <button class="btn-icon btn-favorite-modal" id="btn-modal-favorite" aria-label="Agregar a favoritos" title="Favorito">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
          </button>

          <!-- Botón compartir -->
          <button class="btn-icon" id="btn-share" aria-label="Compartir himno" title="Compartir">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
              <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
              <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
            </svg>
          </button>

          <!-- Botón cerrar -->
          <button class="btn-icon btn-close-modal" id="btn-close-modal" aria-label="Cerrar himno">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
      </header>

      <!-- Cuerpo: letra del himno -->
      <div class="modal__body" id="modal-body">
        <div class="hymn-lyrics" id="hymn-lyrics" aria-label="Letra del himno"></div>
      </div>

      <!-- Pie del modal: navegación entre himnos -->
      <footer class="modal__footer">
        <button class="btn-nav" id="btn-prev-hymn" aria-label="Himno anterior">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
          <span>Anterior</span>
        </button>
        <span class="modal__position" id="modal-position">1 / 385</span>
        <button class="btn-nav" id="btn-next-hymn" aria-label="Himno siguiente">
          <span>Siguiente</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </button>
      </footer>
    </div>
  </div>

  <!-- =============================================
       TOAST DE NOTIFICACIONES
       ============================================= -->
  <div class="toast-container" id="toast-container" aria-live="assertive" aria-atomic="true"></div>

  <!-- =============================================
       BOTÓN SCROLL TO TOP
       ============================================= -->
  <button
    class="scroll-top-btn hidden"
    id="scroll-top-btn"
    aria-label="Volver al inicio"
    title="Ir arriba"
  >
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="18 15 12 9 6 15"/>
    </svg>
  </button>

  <!-- =============================================
       MÓDULOS JAVASCRIPT (ES Modules)
       ============================================= -->
  <script type="module" src="js/app.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Himnario Digital</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <main class="container">
        <header class="main-header">
            <h1>📖 Himnario Digital</h1>
            <p>Índice oficial corporativo</p>
        </header>

        <section class="search-section">
            <input type="text" id="search-input" placeholder="🔍 Busca por número, título o letra...">
        </section>

        <div class="filter-buttons">
            <button class="btn-filter active" onclick="filtrarPorTipo('todos', event)">📚 Todos</button>
            <button class="btn-filter" onclick="filtrarPorTipo('himno', event)">⛪ Himnos</button>
            <button class="btn-filter" onclick="filtrarPorTipo('alabanza', event)">🎸 Alabanzas</button>
        </div>

        <section class="lists-section">
            <ul id="lista-canciones" class="song-list"></ul>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>

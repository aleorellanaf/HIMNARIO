<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Himnario Digital</title>
    <link rel="stylesheet" href="styles.css?v=2">
</head>
<body>

    <div class="container">
        
        <div class="left-column">
            <header class="main-header">
                <h1>Himnario Digital</h1>
                <p>IDS LANIN</p>
            </header>

            <section class="search-section">
                <input type="text" id="search-input" placeholder="busca por número, título o letra...">
            </section>

            <div class="filter-buttons">
                <button class="btn-filter active" onclick="filtrarPorTipo('todos', event)">Todos</button>
                <button class="btn-filter" onclick="filtrarPorTipo('himnos', event)">Himnos</button>
                <button class="btn-filter" onclick="filtrarPorTipo('alabanzas', event)">Alabanzas</button>
            </div>

            <ul id="lista-canciones" class="song-list">
                </ul>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
